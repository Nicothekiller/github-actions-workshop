name: Mi primer CI

on:
  push:
    branches:
      - master
      - dev
    tags:
      - "v*"
  pull_request:


jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run lint
        run: ruff check .

  test:
    runs-on: ubuntu-latest

    needs: lint

    strategy:
      matrix:
        python-version: ["3.10", "3.13"]


    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest

  docker-build:
    runs-on: ubuntu-latest

    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Build docker image
        run: docker build -t github-actions-workshop:latest .

  docker-push:
    runs-on: ubuntu-latest
    needs: docker-build

    if: github.event_name == 'push'
    
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Login in Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/github-actions-workshop
          tags: |
            type=raw,value=latest
            type=raw,value=main,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha
      - name: Build & Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  docker-push-dev:
    runs-on: ubuntu-latest
    needs: docker-build

    if: github.ref == 'refs/heads/dev'
    
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Login in Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & Push Dev Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/github-actions-workshop:dev

  deploy-prod:
    runs-on: ubuntu-latest
    needs: docker-push
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Trigger render PROD deploy
        run: curl -X POST "${{ secrets.RENDER_PROD_DEPLOY_HOOK }}"

  deploy-dev:
    runs-on: ubuntu-latest
    needs: docker-push-dev
    if: github.ref == 'refs/heads/dev'
    steps:
      - name: Trigger render DEV deploy
        run: curl -X POST "${{ secrets.RENDER_DEV_DEPLOY_HOOK }}"

